name: Auto Collect Vibe-Coding Projects

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许写入仓库内容

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # 更新到 v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5  # 更新到 v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MIN_STARS: ${{ secrets.MIN_STARS || '5' }}
          MAX_PROJECTS_PER_RUN: ${{ secrets.MAX_PROJECTS_PER_RUN || '30' }}
          MIN_CONFIDENCE: ${{ secrets.MIN_CONFIDENCE || '0.75' }}
          MIN_QUALITY: ${{ secrets.MIN_QUALITY || '6' }}
        run: |
          cd collector
          python main.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain web/data/ README.md)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add web/data/ README.md
          git commit -m "🤖 Auto-collect: Update vibe-coding cases [$(date +'%Y-%m-%d %H:%M')]"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
      
      - name: Report results
        run: |
          echo "Collection completed at $(date)"
          echo "Changes detected: ${{ steps.check_changes.outputs.has_changes }}"
